<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Beat</title>
</head>
<body>
    <header>
        <nav class="menu">
            <ul>
                <li class="li_menu">Portifolio</li>
                <li class="li_menu">Sobre</li>
                <li class="li_menu">Contato</li>
            </ul>
        </nav>
        <div class="logo">
            <h1>No compaço da batida</h1>
            <figure>
                <img class="logo_img" src="./img/life.png" alt="life">
            </figure>
        </div>
        <nav class="menu">
            <ul>
                <li class="menu_li">Arte & Design</li>
                <li class="menu_li">Estilo & Música</li>
                <li class="menu_li">Ebook & Vídeos</li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>Aquarela</h2>
            <p class="descricao">
                Uma brincadeira com fotos, cores e efeitos, curta, compartilhe e deixe seu comentário, ficarei feliz pelo feedback.
            </p>
            <div class="box_img">
                <img src="./img/danca.png" alt="dança">
                <img src="./img/disco.png" alt="disco">
                <img src="./img/fita.png" alt="fita">
                <img src="./img/musica.png" alt="musica">
            </div>
            <p class="p_main">Veja Mais</p>
        </section>
    </main>
    <footer>
        <section class="redes-sociais">
            <img class="logo_redes" src="./img/insta.png" alt="instagram">
            <img class="logo_redes" src="./img/face.png" alt="facebook">
            <img class="logo_redes" src="./img/linkedin.png" alt="linkedin">
            <img class="logo_redes" src="./img/pinterest.png" alt="pinterest">
        </section>
        <nav>
            <ul class="menu_footer">
                <li class="li_footer">Portifolio</li>
                <li class="li_footer">Sobre</li>
                <li class="li_footer">Contato</li>
            </ul>
        </nav>
    </footer>
</body>
</html>
